<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/users.css">
    <title>User Management</title>
</head>

<body>

    <div class="container mt-4">

        <h2 class="page-title">
            User Management
        </h2>
        <div class="admin-nav">

            <a href="admin-dashboard.html" class="nav-item">
                Dashboard
            </a>

            <a href="users.html" class="nav-item active">
                User Management
            </a>

            <a href="leave-types.html" class="nav-item">
                Leave Configuration
            </a>

            <a href="reports.html" class="nav-item">
                Reports
            </a>

        </div>

        <div class="form-card" id="formCard" style="display:none;">

            <input type="hidden" id="userId">

            <form id="userForm">

                <input type="hidden" id="userId">

                <div class="mb-3">
                    <label class="form-label">Employee ID</label>
                    <input type="text" id="employee_id" class="form-control" placeholder="Enter Employee ID" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Employee Name</label>
                    <input type="text" id="employee_name" class="form-control" placeholder="Enter Employee Name"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter Email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile</label>
                    <input type="text" id="mobile" class="form-control" placeholder="Enter Mobile Number">
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" id="department" class="form-control" placeholder="Enter Department">
                </div>

                <div class="mb-3">
                    <label class="form-label">Designation</label>
                    <input type="text" id="designation" class="form-control" placeholder="Enter Designation">
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select id="role" class="form-select">

                        <option>Employee</option>
                        <option>Manager</option>
                        <option>Admin</option>

                    </select>
                </div>

                <div class="text-center">

                    <button type="submit" class="btn btn-primary px-5">
                        Save User
                    </button>

                    <button type="button" class="btn btn-secondary" onclick="hideForm()">
                        Cancel
                    </button>

                </div>
            </form>
        </div>
    </div>



    <br>
    <div class="table-card" id="tableCard">

        <div class="d-flex gap-2 mb-3">

            <input class="form-control search-box" type="text" id="search"
                placeholder="Search Employee by ID/Name/Department">

            <button class="btn btn-primary" onclick="showForm()">
                + Add User
            </button>

        </div>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Mobile No</th>
                    <th>Department</th>
                    <th>Designation</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th width="180">Action</th>
                </tr>
            </thead>

            <tbody id="userTable"></tbody>

        </table>

    </div>

    </div>

    <script src="../js/users.js"></script>

</body>

</html>
