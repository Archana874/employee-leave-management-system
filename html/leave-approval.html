<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leave Approval</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
    </script>

    <link rel="stylesheet" href="../css/users.css">

</head>

<body>


    <div class="container mt-4">

        <h2 class="page-title">
            Leave Approval Management
        </h2>
        <div class="admin-nav">

            <a href="manager-dashboard.html" class="nav-item">
                Dashboard
            </a>

            <a href="leave-approval.html" class="nav-item active">
                Leave Approval
            </a>


        </div>
        <div class="container mt-4">

            <div class="card shadow">


                <div class="card-body">



                    <div class="row mb-3">

                        <div class="col-md-4">

                            <input type="text" id="search" class="form-control" placeholder="Search Employee">

                        </div>

                    </div>



                    <div class="table-responsive">

                        <table class="table table-bordered table-hover align-middle">

                            <thead class="table-dark">

                                <tr>

                                    <th>ID</th>

                                    <th>Employee Name</th>

                                    <th>Employee ID</th>

                                    <th>Department</th>

                                    <th>Leave Type</th>

                                    <th>Start Date</th>

                                    <th>End Date</th>

                                    <th>Total Days</th>

                                    <th>Reason</th>

                                    <th>Status</th>

                                    <th width="250">
                                        Action
                                    </th>

                                </tr>

                            </thead>

                            <tbody id="approvalTable">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

        <script src="../js/leave-approval.js"></script>

</body>

</html>
