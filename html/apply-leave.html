<!DOCTYPE html>
<html>

<head>

    <title>Apply Leave</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="../css/users.css">

</head>

<body>

    <div class="container mt-4">

        <h2 class="page-title">
            Apply Leave
        </h2>

        <div class="admin-nav">

            <a href="employee-dashboard.html" class="nav-item">
                Dashboard
            </a>

            <a href="apply-leave.html" class="nav-item active">
                Apply Leave
            </a>

            <a href="leave-history.html" class="nav-item">
                Leave History
            </a>

        </div>

        <div class="form-card">

            <h4 class="mb-4">
                Apply Leave Form
            </h4>

            <form id="leaveForm">

                <div class="mb-3">

                    <label class="form-label">
                        Leave Type
                    </label>

                    <select id="leave_type" class="form-select">
                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Start Date
                    </label>

                    <input type="date" id="start_date" class="form-control" required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        End Date
                    </label>

                    <input type="date" id="end_date" class="form-control" required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Total Days
                    </label>

                    <input type="text" id="total_days" class="form-control" readonly>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Reason
                    </label>

                    <textarea id="reason" class="form-control" rows="4" required></textarea>

                </div>

                <div class="text-center">

                    <button type="submit" class="btn btn-primary">
                        Apply Leave
                    </button>

                    <button type="reset" class="btn btn-secondary">
                        Cancel
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="../js/apply-leave.js"></script>

</body>

</html>
