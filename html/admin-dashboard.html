<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<body>

<div class="container">
<div class="header">

    <div class="header-left">

        <h1>Admin Dashboard</h1>

    </div>

    <div class="header-right">

        <span class="user-info">
            👤 Logged in as:
            <strong>Admin</strong>
        </span>

        <button
    class="logout-btn"
    onclick="logout()">

    <i class="bi bi-power"></i>
    Logout

</button>
    </div>

</div>

</div>

<div class="row justify-content-center g-4 mb-2">
    <div class="col-md-3">
        <div class="nav-card"
             onclick="location.href='users.html'">
            <h4>User Management</h4>
        </div>
    </div>

    <div class="col-md-3">
        <div class="nav-card"
             onclick="location.href='leave-types.html'">
            <h4>Leave Configuration</h4>
        </div>
    </div>

    <div class="col-md-3">
        <div class="nav-card"
             onclick="location.href='reports.html'">
            <h4>Reports</h4>
        </div>
    </div>

</div>

</div>

   <div class="dashboard-summary">

    <div class="summary-header">

        <div>
            <h2>Leave Management Summary</h2>
            <p>System overview and leave statistics</p>
        </div>

        <div class="summary-total">
            <span id="totalEmployees">0</span>
        </div>

    </div>

    <hr>

   

    <table class="table summary-table">

        <tr>
            <td>Total Employees</td>
            <td id="totalEmployeesCount">0</td>
        </tr>

        <tr>
            <td>Active Employees</td>
            <td id="activeEmployees">0</td>
        </tr>

        <tr>
            <td>Inactive Employees</td>
            <td id="inactiveEmployees">0</td>
        </tr>



        <tr>
            <td>Total Leave Requests</td>
            <td id="totalRequests">0</td>
        </tr>

        <tr>
            <td>Approved Leaves</td>
            <td id="approvedLeaves">0</td>
        </tr>

        <tr>
            <td>Pending Leaves</td>
            <td id="pendingLeaves">0</td>
        </tr>

        <tr>
            <td>Rejected Leaves</td>
            <td id="rejectedLeaves">0</td>
        </tr>

    </table>

</div>
    <script src="../js/admin-dashboard.js"></script>
</div>
</body>
</html>
