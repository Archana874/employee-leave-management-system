<!DOCTYPE html>
<html>

<head>

    <title>Leave History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/users.css">

</head>

<body>

    <div class="container mt-4">
        <div class="container mt-4">

            <h2 class="page-title">
                Leave History
            </h2>

            <div class="admin-nav">

                <a href="employee-dashboard.html" class="nav-item">
                    Dashboard
                </a>

                <a href="apply-leave.html" class="nav-item">
                    Apply Leave
                </a>

                <a href="leave-history.html" class="nav-item active">
                    Leave History
                </a>

            </div>
            <div class="table-card">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <div class="row mb-3">

                        <div class="col-md-3">
                            <select id="statusFilter" class="form-select">
                                <option value="">All Status</option>
                                <option value="Pending">Pending</option>
                                <option value="Approved">Approved</option>
                                <option value="Rejected">Rejected</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select id="leaveTypeFilter" class="form-select">
                                <option value="">All Leave Types</option>
                                <option value="Casual Leave">Casual Leave</option>
                                <option value="Sick Leave">Sick Leave</option>
                                <option value="Earned Leave">Earned Leave</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <input type="date" id="fromDate" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <input type="date" id="toDate" class="form-control">
                        </div>

                    </div>

                </div>

                <table class="table table-bordered table-striped">

                    <thead class="table-dark">

                        <tr>
                            <th>Request ID</th>
                            <th>Leave Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Days</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                            <th>Remarks</th>
                        </tr>

                    </thead>

                    <tbody id="historyTable">
                    </tbody>

                </table>

            </div>

            <script src="../js/leave-history.js"></script>

</body>

</html>
