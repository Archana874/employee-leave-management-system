<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container mt-4">

        <div class="header">

            <div class="header-left">
                <h1>Manager Dashboard</h1>
            </div>

            <div class="header-right">

                <div class="user-info">
                    <i class="bi bi-person-fill user-icon"></i>
                    Logged in as:
                    <strong>Manager</strong>
                </div>

                <button class="logout-btn" onclick="logout()">

                    <i class="bi bi-power"></i>
                    Logout

                </button>

            </div>

        </div>

    </div>
    <div class="container">

        <div class="row justify-content-center g-4">

            <div class="col-md-4">

                <div class="manager-card" onclick="location.href='leave-approval.html'">

                    <h4>Leave Approval</h4>

                </div>
            </div>

        </div> <!-- row ends here -->

    </div> <!-- container ends here -->


    <div class="dashboard-summary">

        <div class="summary-header">

            <div>
                <h2>Leave Approval Summary</h2>
                <p>Manager leave overview</p>
            </div>

            <div class="summary-total">
                <span id="totalRequests">0</span>
            </div>

        </div>

        <hr>

        <table class="table summary-table">

            <tr>
                <td>Total Requests</td>
                <td id="totalRequestsCount">0</td>
            </tr>

            <tr>
                <td>Pending Requests</td>
                <td id="pendingRequests">0</td>
            </tr>

            <tr>
                <td>Approved Requests</td>
                <td id="approvedRequests">0</td>
            </tr>

            <tr>
                <td>Rejected Requests</td>
                <td id="rejectedRequests">0</td>
            </tr>

        </table>

    </div>

    <script src="../js/manager-dashboard.js"></script>

</body>

</html>
