<!DOCTYPE html>
<html>
<head>

<title>Employee Dashboard</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

<div class="container mt-4">

<div class="header">

    <div class="header-left">
        <h1>Employee Dashboard</h1>
    </div>

    <div class="header-right">

        <div class="user-info">
    <i class="bi bi-person-fill user-icon"></i>
    Logged in as:
    <strong>Employee</strong>
</div>

        <button
    class="logout-btn"
    onclick="logout()">

    <i class="bi bi-power"></i>
    Logout

</button>

    </div>

</div>
<div class="container">

    <div class="row justify-content-center g-4">

        <div class="col-md-4">
            <div class="nav-card"
                 onclick="location.href='apply-leave.html'">

                <h4>Apply Leave</h4>

            </div>
        </div>

        <div class="col-md-4">
            <div class="nav-card"
                 onclick="location.href='leave-history.html'">

                <h4>Leave History</h4>

            </div>
        </div>

    </div>

</div>
<div class="dashboard-summary">

    <div class="summary-header">

        <div>
            <h2>Leave Management Summary</h2>
            <p>Employee leave overview</p>
        </div>

        <div class="summary-total">
            <span id="totalRequests">0</span>
        </div>

    </div>

    <hr>

    <table class="table summary-table">

        <tr>
            <td>Total Requests</td>
            <td id="totalRequestsCount">0</td>
        </tr>

        <tr>
            <td>Approved Requests</td>
            <td id="approvedRequests">0</td>
        </tr>

        <tr>
            <td>Pending Requests</td>
            <td id="pendingRequests">0</td>
        </tr>

        <tr>
            <td>Rejected Requests</td>
            <td id="rejectedRequests">0</td>
        </tr>

        <tr>
            <td>Available Leave Balance</td>
            <td id="leaveBalance">0</td>
        </tr>

    </table>

</div>
</div>

<script src="../js/employee_dashboard.js"></script>

</body>
</html>
